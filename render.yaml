databases:
  - name: egis-db
    plan: free
    databaseName: egis_db
    user: egis_user

services:
  - type: web
    name: egis-fileregistry
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn fileregistry.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: egis-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: RENDER
        value: true
